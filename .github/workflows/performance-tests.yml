name: Performance Tests

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'   # nightly 2AM UTC
  workflow_dispatch:       # permite lanzarlo manualmente desde GitHub

jobs:
  k6-market-baseline:
    name: Market Baseline Load Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run Market Baseline
        env:
          QACLOUD_BASE_URL: ${{ secrets.QACLOUD_BASE_URL }}
          QACLOUD_API_KEY:  ${{ secrets.QACLOUD_API_KEY }}
        run: k6 run src/performance/scenarios/market-load.js

      - name: Upload K6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-market-baseline-results
          path: k6-results/
          retention-days: 30