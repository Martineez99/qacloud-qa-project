# .github/workflows/ci-pr-main.yml
#
# Se ejecuta ÚNICAMENTE en Pull Requests hacia main.
# Flujo serializado para evitar conflictos de estado en qacloud.dev:
#
#   [api-tests] ──→ [e2e-full] ──→ [allure-report]  ← combina ambos resultados
#
# Los workflows e2e-tests.yml y api-tests.yml NO se ejecutan en PR→main
# (sus triggers de PR→main han sido eliminados para evitar duplicados).

name: CI — PR to Main

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── JOB 1: API Tests ─────────────────────────────────────────────
  # Corre primero. Sin browser, rápido (~3-5 min).
  # --workers=1 porque los tests comparten estado en el servidor.
  api-tests:
    name: API Tests — Market
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      QACLOUD_BASE_URL: ${{ secrets.QACLOUD_BASE_URL }}
      QACLOUD_API_KEY: ${{ secrets.QACLOUD_API_KEY }}
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Market API tests
        run: >
          npx playwright test
          --config=config/playwright.config.ts
          --project=api-market
          --project=api-market-contract
          --workers=1
          --reporter=list

      - name: Upload Allure results (API)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api-${{ github.run_number }}
          path: reports/allure-results/
          retention-days: 7

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-api-${{ github.run_number }}
          path: test-results/
          retention-days: 7

  # ── JOB 2: Full E2E ──────────────────────────────────────────────
  # Corre después de api-tests (needs:).
  # El entorno de datos queda en estado conocido tras los API tests.
  e2e-full:
    name: Full E2E — Chromium
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: api-tests
    if: always()   # corre aunque api-tests haya fallado — queremos ver ambos reportes

    env:
      QACLOUD_BASE_URL: ${{ secrets.QACLOUD_BASE_URL }}
      QACLOUD_API_KEY: ${{ secrets.QACLOUD_API_KEY }}
      QACLOUD_USERNAME: ${{ secrets.QACLOUD_USERNAME }}
      QACLOUD_PASSWORD: ${{ secrets.QACLOUD_PASSWORD }}
      HEADLESS: true
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full E2E suite
        run: >
          npx playwright test
          --config=config/playwright.config.ts
          --project=smoke-login
          --project=smoke-navigation
          --project=e2e-market

      - name: Upload Allure results (E2E)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-e2e-${{ github.run_number }}
          path: reports/allure-results/
          retention-days: 7

      - name: Upload test results (videos y traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-e2e-${{ github.run_number }}
          path: test-results/
          retention-days: 7

  # ── JOB 3: Allure Report combinado ───────────────────────────────
  # Descarga los resultados de API + E2E, los fusiona y genera un
  # único reporte HTML disponible como artifact del workflow.
  allure-report:
    name: Generate Combined Allure Report
    runs-on: ubuntu-latest
    needs: [api-tests, e2e-full]
    if: always()   # siempre, aunque algún job anterior haya fallado

    steps:
      - name: Download Allure results — API
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api-${{ github.run_number }}
          path: allure-results-merged/
        # Si api-tests no subió artifact (fallo muy temprano), continuar igualmente
        continue-on-error: true

      - name: Download Allure results — E2E
        uses: actions/download-artifact@v4
        with:
          name: allure-results-e2e-${{ github.run_number }}
          path: allure-results-merged/
        # merge-multiple no aplica aquí porque son artifacts distintos;
        # ambos se descargan en la misma carpeta → quedan fusionados
        continue-on-error: true

      - name: Setup Java (requerido por Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Allure CLI
        run: npm install -g allure-commandline@2.38.1

      - name: Generate combined Allure report
        run: allure generate allure-results-merged -o allure-report --clean

      - name: Upload combined Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # El nombre incluye el resultado para identificarlo rápido en la UI de GitHub
          name: allure-report-pr-${{ github.event.pull_request.number }}-run-${{ github.run_number }}
          path: allure-report/
          retention-days: 14