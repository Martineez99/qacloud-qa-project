# .github/workflows/e2e-tests.yml
#
# Triggers activos:
#   · pull_request → develop  : smoke tests (feedback rápido, ~2-3 min)
#   · push → main             : full E2E + deploy Allure en GitHub Pages
#
# ⚠️  pull_request → main se gestiona en ci-pr-main.yml (flujo serializado
#     api-tests → e2e-full → allure combinado). No duplicar aquí.

name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - develop   # ← main eliminado intencionalmente; lo gestiona ci-pr-main.yml

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── JOB 1: Smoke Tests — solo en PRs hacia develop ───────────────
  # Feedback rápido: 2-3 min. No bloquea con regresión completa.
  e2e-smoke:
    name: Smoke Tests — Chromium
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request' && github.base_ref == 'develop'

    env:
      QACLOUD_BASE_URL: ${{ secrets.QACLOUD_BASE_URL }}
      QACLOUD_API_KEY: ${{ secrets.QACLOUD_API_KEY }}
      QACLOUD_USERNAME: ${{ secrets.QACLOUD_USERNAME }}
      QACLOUD_PASSWORD: ${{ secrets.QACLOUD_PASSWORD }}
      HEADLESS: true
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test --config=config/playwright.config.ts --grep @smoke --project=smoke-login --project=smoke-navigation

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke-${{ github.run_number }}
          path: reports/allure-results/
          retention-days: 7

  # ── JOB 2: Full E2E — solo en push a main ────────────────────────
  # Regresión completa tras merge. También alimenta el deploy de Pages.
  e2e-full:
    name: Full E2E — Chromium
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      QACLOUD_BASE_URL: ${{ secrets.QACLOUD_BASE_URL }}
      QACLOUD_API_KEY: ${{ secrets.QACLOUD_API_KEY }}
      QACLOUD_USERNAME: ${{ secrets.QACLOUD_USERNAME }}
      QACLOUD_PASSWORD: ${{ secrets.QACLOUD_PASSWORD }}
      HEADLESS: true
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full E2E suite
        run: npx playwright test --config=config/playwright.config.ts --project=smoke-login --project=smoke-navigation --project=e2e-market

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-e2e-${{ github.run_number }}
          path: reports/allure-results/
          retention-days: 30

      - name: Upload test results (videos y traces en fallos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-e2e-${{ github.run_number }}
          path: test-results/
          retention-days: 7

  # ── JOB 3: Publicar Allure en GitHub Pages ───────────────────────
  # Solo tras push a main. Depende del full E2E.
  # if: always() → publica aunque e2e-full tenga fallos (reporte con rojos)
  deploy-report:
    name: Publish Allure Report → GitHub Pages
    needs: e2e-full
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-e2e-${{ github.run_number }}
          path: allure-results

      - name: Install Allure CLI
        run: npm install -g allure-commandline@2.38.1

      - name: Generate Allure report
        run: allure generate allure-results -o allure-report --clean

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4