# .github/workflows/e2e-tests.yml
#
# Triggers activos:
#   · pull_request → develop  : smoke tests (feedback rápido, ~2-3 min)
#   · push → main             : api-tests → e2e-full → deploy Allure combinado en GitHub Pages
#
# ⚠️  pull_request → main se gestiona en ci-pr-main.yml.
#     No duplicar ese trigger aquí.

name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - develop

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── JOB 1: Smoke Tests — solo en PRs hacia develop ───────────────
  e2e-smoke:
    name: Smoke Tests — Chromium
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request' && github.base_ref == 'develop'

    env:
      QACLOUD_BASE_URL: ${{ secrets.QACLOUD_BASE_URL }}
      QACLOUD_API_KEY: ${{ secrets.QACLOUD_API_KEY }}
      QACLOUD_USERNAME: ${{ secrets.QACLOUD_USERNAME }}
      QACLOUD_PASSWORD: ${{ secrets.QACLOUD_PASSWORD }}
      HEADLESS: true
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test --config=config/playwright.config.ts --grep @smoke --project=smoke-login --project=smoke-navigation

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke-${{ github.run_number }}
          path: reports/allure-results/
          retention-days: 7

  # ── JOB 2: API Tests — solo en push a main ───────────────────────
  # Corre primero para evitar conflictos de estado con E2E.
  # --workers=1 porque los tests comparten estado en el servidor.
  # ⚠️  Sin --reporter en CLI: el config ya define list + allure-playwright.
  #     Pasar --reporter por CLI reemplaza TODOS los reporters del config,
  #     lo que impide que allure-playwright escriba en reports/allure-results/.
  api-tests:
    name: API Tests — Market
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      QACLOUD_BASE_URL: ${{ secrets.QACLOUD_BASE_URL }}
      QACLOUD_API_KEY: ${{ secrets.QACLOUD_API_KEY }}
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Market API tests
        run: >
          npx playwright test
          --config=config/playwright.config.ts
          --project=api-market
          --project=api-market-contract
          --workers=1

      - name: Upload Allure results (API)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api-${{ github.run_number }}
          path: reports/allure-results/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-api-${{ github.run_number }}
          path: test-results/
          retention-days: 7

  # ── JOB 3: Full E2E — solo en push a main ────────────────────────
  # Depende de api-tests para evitar conflictos de estado.
  # if: always() → corre aunque api-tests haya fallado (queremos ver ambos en el reporte).
  e2e-full:
    name: Full E2E — Chromium
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: api-tests
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      QACLOUD_BASE_URL: ${{ secrets.QACLOUD_BASE_URL }}
      QACLOUD_API_KEY: ${{ secrets.QACLOUD_API_KEY }}
      QACLOUD_USERNAME: ${{ secrets.QACLOUD_USERNAME }}
      QACLOUD_PASSWORD: ${{ secrets.QACLOUD_PASSWORD }}
      HEADLESS: true
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full E2E suite
        run: npx playwright test --config=config/playwright.config.ts --project=smoke-login --project=smoke-navigation --project=e2e-market

      - name: Upload Allure results (E2E)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-e2e-${{ github.run_number }}
          path: reports/allure-results/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload test results (videos y traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-e2e-${{ github.run_number }}
          path: test-results/
          retention-days: 7

  # ── JOB 4: Deploy Allure combinado en GitHub Pages ───────────────
  # Descarga resultados de API + E2E, los fusiona y despliega.
  # if: always() → publica aunque algún job anterior tenga fallos.
  deploy-report:
    name: Publish Combined Allure Report → GitHub Pages
    runs-on: ubuntu-latest
    needs: [api-tests, e2e-full]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Allure results — API
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api-${{ github.run_number }}
          path: allure-results-merged/
        continue-on-error: true

      - name: Download Allure results — E2E
        uses: actions/download-artifact@v4
        with:
          name: allure-results-e2e-${{ github.run_number }}
          path: allure-results-merged/
        continue-on-error: true

      - name: Install Allure CLI
        run: npm install -g allure-commandline@2.38.1

      - name: Generate combined Allure report
        run: allure generate allure-results-merged -o allure-report --clean

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4